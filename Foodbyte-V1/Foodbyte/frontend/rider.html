<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="rider.css">
</head>
<body>

<div id="rider-app">

    <nav class="rider-sidebar">
        <div id="rider-nav-text-div">
         <h1 id="nav-available">Available Orders</h1>
        <h1 id="nav-selected">Selected Orders</h1>
        <h1 id="nav-account">My Account</h1>
        <h1 id="nav-logout">Log out</h1>
        </div>
       
    </nav>

    <main class="rider-main">
  <div id="rider-welcome">Welcome Rider</div>
        <!-- AVAILABLE ORDERS -->
        <section id="section-available" class="rider-section">
            <fieldset class="rider_fieldset">
                <legend class="rider_legend">Available Orders</legend>

                <div class="table-wrapper">
                    <table id="available-table">
                        <thead>
                            <tr>
                                <th>Food</th>
                                <th>Customer</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Payment</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

            </fieldset>
        </section>

        <!-- SELECTED ORDERS -->
        <section id="section-selected" class="rider-section">
            <fieldset class="rider_fieldset">
                <legend class="rider_legend">Selected Orders</legend>

                <div class="table-wrapper">
                    <table id="selected-table">
                        <thead>
                            <tr>
                                <th>Food</th>
                                <th>Customer</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Payment</th>
                                <th>Price</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

            </fieldset>
        </section>

        <!-- ACCOUNT -->
        <section id="section-account" class="rider-section">

           

            
                <div id="rider_username">
                   Username: Rider11
                </div>

                <fieldset id="contact-box" disabled class="rider_fieldset">
                    <legend class="rider_legend">My Info</legend>

                    <div class="form-grid">
                        <div class="form-grid-div"> 
                            <label for="rider-phone">Phone:</label>
                            <input type="tel" id="rider-phone">
                        </div>
                        <div class="form-grid-div">
                            <label for="rider-licence">Licence link:</label>
                            <input type="tel" id="rider-licence">
                        </div>
                        <div class="form-grid-div">
                            <label for="rider-photo">Photo link:</label>
                            <input type="link" id="rider-photo">
                        </div>

                        <div class="form-grid-div">
                            <label for="rider-joining-date">Joining Date:</label>
                            <input type="text" id="rider-joining-date">
                        </div>
                    </div>
                </fieldset>

                

            
        </section>

    </main>

</div>

<script type="module"  src="rider.js"></script>
</body>
</html>
